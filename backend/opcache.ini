[opcache]
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=20
opcache.max_accelerated_files=20000
; In production, files don't change — skip filesystem checks for speed
opcache.validate_timestamps=0
opcache.save_comments=1
; Enable for CLI commands (cache:warmup, doctrine:schema:validate etc.)
opcache.enable_cli=1
; PHP preloading via Symfony's preload.php (runs once at PHP-FPM start)
opcache.preload=/var/www/symfony/config/preload.php
opcache.preload_user=www-data
